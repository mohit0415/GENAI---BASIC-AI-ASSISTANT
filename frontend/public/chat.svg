<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7eb3"></stop>
      <stop offset="50%" stop-color="#7afcff"></stop>
      <stop offset="100%" stop-color="#6a5cff"></stop>
    </linearGradient>

    <radialGradient id="faceGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e3c72"></stop>
      <stop offset="100%" stop-color="#0b1a3a"></stop>
    </radialGradient>
  </defs>

  <!-- Body -->
  <ellipse cx="64" cy="64" rx="48" ry="40" fill="url(#bodyGrad)"></ellipse>

  <!-- Face -->
  <ellipse cx="64" cy="64" rx="36" ry="28" fill="url(#faceGrad)"></ellipse>

  <!-- Eyes -->
  <circle cx="52" cy="60" r="6" fill="#7afcff"></circle>
  <circle cx="76" cy="60" r="6" fill="#7afcff"></circle>

  <!-- Smile -->
  <path d="M52 76 Q64 88 76 76" stroke="#00ffd5" stroke-width="4" fill="none" stroke-linecap="round"></path>

  <!-- Antenna -->
  <line x1="64" y1="24" x2="64" y2="36" stroke="#6a5cff" stroke-width="4"></line>
  <circle cx="64" cy="20" r="6" fill="#ffb347"></circle>

  <!-- Sparkles -->
  <circle cx="20" cy="30" r="3" fill="#ffd700"></circle>
  <circle cx="108" cy="40" r="3" fill="#00eaff"></circle>
  <circle cx="30" cy="100" r="2" fill="#ff69b4"></circle>
  <circle cx="100" cy="100" r="2" fill="#7afcff"></circle>
</svg>